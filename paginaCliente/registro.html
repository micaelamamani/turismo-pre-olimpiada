<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Registrarse</title>
    <link rel="stylesheet" href="../estilos/estiloInicio.css">
    <link rel="stylesheet" href="../estilos/registro.css">
    <link rel="stylesheet" href="../estilos/iniciarSesion.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>
    <header>
    <div class="logo">
        <i class="fas fa-plane"></i>
        <div class="texto-logo"><h2>TRIPBUY</h2></div>
    </div>
    <nav>
        <a href="index.html"><i class="fas fa-home"></i><span>inicio</span></a>
        <a href="#">
            <i class="fas fa-phone"></i>
            <span>contacto</span>
        </a>
    </nav>
    <div class="login-top">
        <i class="fas fa-user-circle"></i>
        <a href="iniciarSesion.html">Iniciar sesion</a>
    </div>
</header>
    <main>
        <div class="contenedor-form">
            <h1>Registro</h1>
            <form id="registro">
                <input type="text" id="nombre" placeholder="Nombre" required>

                <input type="text" id="apellido" placeholder="Apellido" required>

                <input type="text" id="usuario" placeholder="Usuario" required>

                <input type="email" id="email" placeholder="Correo electrónico" required>

                <input type="password" id="contraseña" placeholder="Contraseña" required>

                <button id="registrarse" type="button">

                    Registrarse

                </button>

                <p id="mensajeError"></p>

                <a href="login.html" class="login">

                    ¿Ya tienes cuenta?

                </a>

            </form>

        </div>

    </main>

    <script src="../js/registro.js"></script>

</body>

</html>
