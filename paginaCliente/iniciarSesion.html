    <link rel="stylesheet" href="../estilos/iniciarSesion.css">

<main>
    <section class="contenedor-form">
        <h1>inicio de sesion</h1>
        <form action="" method="POST">

            <input type="text" id="usuario" name="usuario" required>
            
            <label for="password">contraseña</label>
            <input type="password" id="contraseña" name="password" required>
            <p id="mensajeError"></p>
            <button id="iniciarSesion" type="button">INGRESAR</button>
            <a href="registro.html" class="registrarse">REGISTRARSE</a>
        </form>
    </section>
